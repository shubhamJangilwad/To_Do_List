<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
        }

        h1 {
            color: #333;
        }

        form {
            margin: 20px;
        }

        input {
            padding: 10px;
            width: 200px;
        }

        button {
            padding: 10px 15px;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: darkgreen;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: white;
            margin: 10px auto;
            padding: 10px;
            width: 300px;
            border-radius: 5px;
        }

        a {
            margin-left: 10px;
            color: red;
            text-decoration: none;
        }
    </style>

</head>
<body>

    <h1>My To-Do List</h1>

    <form action="/add" method="POST">
        <input type="text" name="task" placeholder="Enter your task">
        <button type="submit">Add</button>
    </form>

    <ul>
        {% for t in tasks %}
            <li>
                {{ t }}
                <a href="/delete/{{ loop.index0 }}">Delete</a>
            </li>
        {% endfor %}
    </ul>

</body>
</html>
